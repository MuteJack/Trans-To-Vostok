# Crowdin CLI configuration for Trans-to-Vostok.
#
# Sync direction (manual, run from repo root):
#   Sources : Translation_TSV/Template/  --build_source.py-->  Crowdin_Mirror/source/  --[crowdin upload sources]-->  Crowdin
#   Seeds   : Translation_TSV/<locale>/   --build_translations.py-->  Crowdin_Mirror/translations/<locale>/  --[crowdin upload translations]-->  Crowdin
#   Pull    : Crowdin  --[crowdin download]-->  Crowdin_Mirror/translations/<locale>/  --apply_to_xlsx.py-->  xlsx/TSV
#
# Token: store in env var CROWDIN_PERSONAL_TOKEN
#   Windows : setx CROWDIN_PERSONAL_TOKEN "<token>"
#   bash    : export CROWDIN_PERSONAL_TOKEN=<token>
#
# Project ID: replace below with the numeric ID from your Crowdin project
#   (Project Settings -> API -> Project ID).

"project_id": "895780"
"api_token_env": "CROWDIN_PERSONAL_TOKEN"

"base_path": "."
"base_url": "https://api.crowdin.com"

"preserve_hierarchy": true

# Source language is English (Template TSVs).
# `languages_mapping` lives PER FILE entry (not top-level); maps Crowdin
# language ids to the folder names we use under translations/.
"files": [
  {
    "source": "/Crowdin_Mirror/source/Translation/*.tsv",
    "translation": "/Crowdin_Mirror/translations/%locale%/Translation/%original_file_name%",
    "type": "csv",
    "scheme": "identifier,source_phrase,translation,context,labels,max_length",
    "delimiter": "\t",
    "first_line_contains_header": true,
    "languages_mapping": {
      "locale": {
        "ko": "Korean",
        "fr": "French",
        "pt-BR": "Portuguese_BR"
      }
    }
  },
  {
    "source": "/Crowdin_Mirror/source/Glossary/*.tsv",
    "translation": "/Crowdin_Mirror/translations/%locale%/Glossary/%original_file_name%",
    "type": "csv",
    "scheme": "identifier,source_phrase,translation,context,labels,max_length",
    "delimiter": "\t",
    "first_line_contains_header": true,
    "languages_mapping": {
      "locale": {
        "ko": "Korean",
        "fr": "French",
        "pt-BR": "Portuguese_BR"
      }
    }
  },
  {
    "source": "/Crowdin_Mirror/source/Texture/*.tsv",
    "translation": "/Crowdin_Mirror/translations/%locale%/Texture/%original_file_name%",
    "type": "csv",
    "scheme": "identifier,source_phrase,translation,context,labels,max_length",
    "delimiter": "\t",
    "first_line_contains_header": true,
    "languages_mapping": {
      "locale": {
        "ko": "Korean",
        "fr": "French",
        "pt-BR": "Portuguese_BR"
      }
    }
  }
]
